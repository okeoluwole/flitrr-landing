<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Amber background, full bleed -->
  <rect width="1200" height="630" fill="#F4C031"/>

  <!-- Top-left: typed letter F in Montserrat ExtraBold deep blue, ~220px tall -->
  <text
    x="80"
    y="80"
    fill="#376183"
    font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="220"
    letter-spacing="-0.04em"
    dominant-baseline="hanging"
  >F</text>

  <!-- Headline: "One platform." Montserrat ExtraBold deep blue -->
  <text
    x="80"
    y="400"
    fill="#376183"
    font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="108"
    letter-spacing="-0.025em"
    dominant-baseline="middle"
  >One platform.</text>

  <!-- Sub-line: brand descriptor in Inter 500 deep blue -->
  <text
    x="80"
    y="500"
    fill="#376183"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="34"
    letter-spacing="-0.005em"
    dominant-baseline="middle"
  >End-to-end property development for independent and SME developers.</text>
</svg>
